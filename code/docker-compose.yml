name: motivo-studio

services:
  motivo-studio-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: motivo_studio
      POSTGRES_USER: motivo
      POSTGRES_PASSWORD: motivo
    volumes:
      - motivo-studio-postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U motivo -d motivo_studio"]
      interval: 5s
      timeout: 5s
      retries: 10

  motivo-studio-server:
    build:
      context: .
      dockerfile: server/Dockerfile
    command: ["sh", "-c", "node dist/db/migrate.js && node dist/server.js"]
    environment:
      PORT: "3001"
      COMPILER_BIN: /usr/local/bin/motivoc
      HOSTNAME: "0.0.0.0"
      DATABASE_URL: postgres://motivo:motivo@motivo-studio-db:5432/motivo_studio
      SESSION_COOKIE_NAME: motivo_session
      SESSION_COOKIE_SECURE: "false"
      SESSION_SECRET: change-me-in-production
      SESSION_TTL_SECONDS: "2592000"
    depends_on:
      motivo-studio-db:
        condition: service_healthy

  motivo-studio-client:
    build:
      context: client
      dockerfile: Dockerfile
      args:
        API_PROXY_URL: http://motivo-studio-server:3001
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      API_PROXY_URL: http://motivo-studio-server:3001
      HOSTNAME: "0.0.0.0"
    depends_on:
      - motivo-studio-server

  motivo-studio-gateway:
    build:
      context: nginx
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - motivo-studio-client
      - motivo-studio-server

volumes:
  motivo-studio-postgres-data:
