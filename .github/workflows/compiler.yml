name: Compiler Workflow

on:
  workflow_dispatch:
  push:
    branches:
      - "**"
    paths:
      - "code/compiler/**"
      - ".github/workflows/compiler.yml"
      - ".github/scripts/compiler/**"

permissions:
  contents: read

concurrency:
  group: compiler-ci-${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

env:
  COMPILER_DIR: code/compiler
  COMPILER_BUILD_DIR: build/compiler-ci
  COMPILER_BUILD_TYPE: Debug
  COMPILER_REPORT_DIR: build/compiler-ci/.ci-reports
  COMPILER_BUILD_ARTIFACT_NAME: compiler-build
  COMPILER_TEST_REPORT_ARTIFACT_NAME: compiler-test-reports
  COMPILER_ARTIFACT_RETENTION_DAYS: "7"
  CI_CMAKE_GENERATOR: Ninja
  CI_FETCHCONTENT_BASE_DIR: /home/runner/.cache/compiler-ci/fetchcontent
  REPORT_REPO: ${{ github.repository }}
  REPORT_SHA: ${{ github.sha }}

jobs:
  static:
    name: Static Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install formatting tools
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y clang-format

      - name: Check formatting
        working-directory: ${{ env.COMPILER_DIR }}
        run: make ci-static

  build:
    name: Build Compiler
    runs-on: ubuntu-latest
    needs:
      - static
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup CMake
        uses: lukka/get-cmake@latest

      - name: Restore FetchContent cache
        id: restore_fetchcontent
        uses: actions/cache/restore@v5
        with:
          path: ${{ env.CI_FETCHCONTENT_BASE_DIR }}
          key: ${{ runner.os }}-compiler-fetchcontent-${{ hashFiles('code/compiler/tests/CMakeLists.txt') }}

      - name: Install build dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y bison flex g++ libfl-dev ninja-build

      - name: Configure and build compiler
        id: build_compiler
        working-directory: ${{ env.COMPILER_DIR }}
        env:
          CI_BUILD_DIR: ../../${{ env.COMPILER_BUILD_DIR }}
          CI_BUILD_TYPE: ${{ env.COMPILER_BUILD_TYPE }}
          CI_REPORT_DIR: ../../${{ env.COMPILER_REPORT_DIR }}
          CI_CMAKE_GENERATOR: ${{ env.CI_CMAKE_GENERATOR }}
          CI_FETCHCONTENT_BASE_DIR: ${{ env.CI_FETCHCONTENT_BASE_DIR }}
        run: |
          set +e
          make ci-build
          rc=$?
          echo "exit_code=${rc}" >> "${GITHUB_OUTPUT}"
          exit 0

      - name: Summarize build findings
        if: always() && steps.build_compiler.outputs.exit_code != '0'
        run: python3 .github/scripts/compiler/summarize-build.py

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: compiler-build-logs
          path: ${{ env.COMPILER_REPORT_DIR }}
          include-hidden-files: true
          retention-days: ${{ env.COMPILER_ARTIFACT_RETENTION_DAYS }}
          if-no-files-found: warn

      - name: Package build artifact
        if: steps.build_compiler.outputs.exit_code == '0'
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/compiler-build-artifact"
          tar \
            --create \
            --file "${RUNNER_TEMP}/compiler-build-artifact/compiler-build.tar" \
            --directory "${COMPILER_BUILD_DIR}" \
            .

      - name: Upload build artifact
        if: steps.build_compiler.outputs.exit_code == '0'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.COMPILER_BUILD_ARTIFACT_NAME }}
          path: ${{ runner.temp }}/compiler-build-artifact/compiler-build.tar
          retention-days: ${{ env.COMPILER_ARTIFACT_RETENTION_DAYS }}
          if-no-files-found: error

      - name: Save FetchContent cache
        if: always() && !cancelled() && steps.restore_fetchcontent.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ env.CI_FETCHCONTENT_BASE_DIR }}
          key: ${{ steps.restore_fetchcontent.outputs.cache-primary-key }}

      - name: Fail on build errors
        if: steps.build_compiler.outputs.exit_code != '0'
        run: exit 1

  test:
    name: Test Compiler
    runs-on: ubuntu-latest
    needs:
      - build
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.COMPILER_BUILD_ARTIFACT_NAME }}
          path: ${{ runner.temp }}/compiler-build-artifact

      - name: Restore build artifact
        run: |
          set -euo pipefail
          mkdir -p "${COMPILER_BUILD_DIR}"
          tar \
            --extract \
            --file "${RUNNER_TEMP}/compiler-build-artifact/compiler-build.tar" \
            --directory "${COMPILER_BUILD_DIR}"

      - name: Run compiler tests
        id: run_tests
        working-directory: ${{ env.COMPILER_DIR }}
        env:
          CI_BUILD_DIR: ../../${{ env.COMPILER_BUILD_DIR }}
          CI_BUILD_TYPE: ${{ env.COMPILER_BUILD_TYPE }}
          CI_REPORT_DIR: ../../${{ env.COMPILER_REPORT_DIR }}
        run: |
          set +e
          make ci-test
          rc=$?
          echo "exit_code=${rc}" >> "${GITHUB_OUTPUT}"
          exit 0

      - name: Summarize test findings
        if: always()
        env:
          TEST_REPORT_NAME: CTest
        run: python3 .github/scripts/compiler/summarize-tests.py

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.COMPILER_TEST_REPORT_ARTIFACT_NAME }}
          path: ${{ env.COMPILER_REPORT_DIR }}
          include-hidden-files: true
          retention-days: ${{ env.COMPILER_ARTIFACT_RETENTION_DAYS }}
          if-no-files-found: warn

      - name: Fail on test errors
        if: steps.run_tests.outputs.exit_code != '0'
        run: exit 1

  package:
    name: Package Server Image
    runs-on: ubuntu-latest
    needs:
      - test
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build server image with compiler
        working-directory: ${{ env.COMPILER_DIR }}
        env:
          CI_PACKAGE_TAG: motivo-studio-server-ci:${{ github.sha }}
        run: make ci-package
