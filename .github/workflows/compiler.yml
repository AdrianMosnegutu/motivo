name: Compiler Workflow

on:
  workflow_dispatch:
  push:
    branches:
      - "**"
    paths:
      - "code/compiler/**"
      - ".github/workflows/compiler.yml"
      - ".github/scripts/compiler/**"

permissions:
  contents: read

concurrency:
  group: compiler-ci-${{ github.workflow }}-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

env:
  COMPILER_DIR: code/compiler
  COMPILER_BUILD_DIR: build/compiler-ci
  COMPILER_BUILD_TYPE: Debug
  COMPILER_REPORT_DIR: build/compiler-ci/.ci-reports
  COMPILER_FETCHCONTENT_BASE_DIR: /home/runner/.cache/compiler-ci/fetchcontent
  CMAKE_GENERATOR: Ninja
  COMPILER_BUILD_ARTIFACT_NAME: compiler-build
  COMPILER_BUILD_ARTIFACT_RETENTION_DAYS: "7"
  COMPILER_TEST_REPORT_ARTIFACT_NAME: compiler-test-reports
  COMPILER_CCACHE_DIR: /home/runner/.cache/ccache

jobs:
  format-check:
    name: Check Formatting
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install formatting tools
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y clang-format

      - name: Verify compiler formatting
        env:
          COMPILER_DIR: ${{ env.COMPILER_DIR }}
          REPORT_REPO: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name || github.repository }}
          REPORT_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        run: bash .github/scripts/compiler/check-format.sh

  build:
    name: Build Compiler
    runs-on: ubuntu-latest
    needs:
      - format-check
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup CMake
        uses: lukka/get-cmake@latest

      - name: Restore ccache
        id: restore_ccache
        uses: actions/cache/restore@v5
        with:
          path: ${{ env.COMPILER_CCACHE_DIR }}
          key: ${{ runner.os }}-compiler-ccache-${{ hashFiles('code/compiler/CMakeLists.txt', 'code/compiler/src/CMakeLists.txt', 'code/compiler/src/scanner/CMakeLists.txt', 'code/compiler/tests/CMakeLists.txt') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-compiler-ccache-${{ hashFiles('code/compiler/CMakeLists.txt', 'code/compiler/src/CMakeLists.txt', 'code/compiler/src/scanner/CMakeLists.txt', 'code/compiler/tests/CMakeLists.txt') }}-
            ${{ runner.os }}-compiler-ccache-

      - name: Restore FetchContent cache
        id: restore_fetchcontent
        uses: actions/cache/restore@v5
        with:
          path: ${{ env.COMPILER_FETCHCONTENT_BASE_DIR }}
          key: ${{ runner.os }}-compiler-fetchcontent-${{ hashFiles('code/compiler/tests/CMakeLists.txt') }}

      - name: Install build dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y ccache flex g++ libfl-dev ninja-build

      - name: Configure and build compiler
        id: build_compiler
        env:
          COMPILER_DIR: ${{ env.COMPILER_DIR }}
          COMPILER_BUILD_DIR: ${{ env.COMPILER_BUILD_DIR }}
          COMPILER_BUILD_TYPE: ${{ env.COMPILER_BUILD_TYPE }}
          COMPILER_REPORT_DIR: ${{ env.COMPILER_REPORT_DIR }}
          COMPILER_FETCHCONTENT_BASE_DIR: ${{ env.COMPILER_FETCHCONTENT_BASE_DIR }}
          CCACHE_DIR: ${{ env.COMPILER_CCACHE_DIR }}
          CMAKE_GENERATOR: ${{ env.CMAKE_GENERATOR }}
        run: |
          set +e
          bash .github/scripts/compiler/build.sh
          rc=$?
          echo "exit_code=${rc}" >> "${GITHUB_OUTPUT}"
          exit 0

      - name: Summarize build findings
        if: always() && steps.build_compiler.outputs.exit_code != '0'
        env:
          COMPILER_REPORT_DIR: ${{ env.COMPILER_REPORT_DIR }}
          REPORT_REPO: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name || github.repository }}
          REPORT_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        run: python3 .github/scripts/compiler/summarize-build.py

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: compiler-build-logs
          path: ${{ env.COMPILER_REPORT_DIR }}
          include-hidden-files: true
          retention-days: ${{ env.COMPILER_BUILD_ARTIFACT_RETENTION_DAYS }}
          if-no-files-found: warn

      - name: Package build artifact
        if: steps.build_compiler.outputs.exit_code == '0'
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/compiler-build-artifact"
          tar \
            --create \
            --file "${RUNNER_TEMP}/compiler-build-artifact/compiler-build.tar" \
            --directory "${COMPILER_BUILD_DIR}" \
            .

      - name: Upload build artifact
        if: steps.build_compiler.outputs.exit_code == '0'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.COMPILER_BUILD_ARTIFACT_NAME }}
          path: ${{ runner.temp }}/compiler-build-artifact/compiler-build.tar
          retention-days: ${{ env.COMPILER_BUILD_ARTIFACT_RETENTION_DAYS }}
          if-no-files-found: error

      - name: Save ccache
        if: always() && !cancelled() && steps.restore_ccache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ env.COMPILER_CCACHE_DIR }}
          key: ${{ steps.restore_ccache.outputs.cache-primary-key }}

      - name: Save FetchContent cache
        if: always() && !cancelled() && steps.restore_fetchcontent.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ env.COMPILER_FETCHCONTENT_BASE_DIR }}
          key: ${{ steps.restore_fetchcontent.outputs.cache-primary-key }}

      - name: Fail on build errors
        if: steps.build_compiler.outputs.exit_code != '0'
        run: exit 1

  test:
    name: Test Compiler
    runs-on: ubuntu-latest
    needs:
      - build
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.COMPILER_BUILD_ARTIFACT_NAME }}
          path: ${{ runner.temp }}/compiler-build-artifact

      - name: Restore build artifact
        run: |
          set -euo pipefail
          mkdir -p "${COMPILER_BUILD_DIR}"
          tar \
            --extract \
            --file "${RUNNER_TEMP}/compiler-build-artifact/compiler-build.tar" \
            --directory "${COMPILER_BUILD_DIR}"

      - name: Run compiler tests
        id: run_tests
        env:
          COMPILER_BUILD_DIR: ${{ env.COMPILER_BUILD_DIR }}
          COMPILER_BUILD_TYPE: ${{ env.COMPILER_BUILD_TYPE }}
          COMPILER_REPORT_DIR: ${{ env.COMPILER_REPORT_DIR }}
        run: |
          set +e
          bash .github/scripts/compiler/run-tests.sh
          rc=$?
          echo "exit_code=${rc}" >> "${GITHUB_OUTPUT}"
          exit 0

      - name: Summarize test findings
        if: always()
        env:
          COMPILER_REPORT_DIR: ${{ env.COMPILER_REPORT_DIR }}
        run: python3 .github/scripts/compiler/summarize-tests.py

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.COMPILER_TEST_REPORT_ARTIFACT_NAME }}
          path: ${{ env.COMPILER_REPORT_DIR }}
          include-hidden-files: true
          retention-days: ${{ env.COMPILER_BUILD_ARTIFACT_RETENTION_DAYS }}
          if-no-files-found: warn

      - name: Fail on test errors
        if: steps.run_tests.outputs.exit_code != '0'
        run: exit 1

  package-server:
    name: Package Server Image
    runs-on: ubuntu-latest
    needs:
      - test
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build server image with compiler
        run: docker build --tag dsl-server-ci:${{ github.sha }} --file code/server/Dockerfile code
