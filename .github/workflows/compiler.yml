name: Compiler Workflow

on:
  workflow_dispatch:
  push:
    branches:
      - "**"
    paths:
      - "code/compiler/**"
      - ".github/workflows/compiler.yml"
      - ".github/scripts/compiler/**"

permissions:
  contents: read
  actions: read
  checks: write

concurrency:
  group: compiler-ci-${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

env:
  COMPILER_DIR: code/compiler
  COMPILER_BUILD_DIR: build/compiler-ci
  COMPILER_BUILD_TYPE: Debug
  COMPILER_REPORT_DIR: build/compiler-ci/.ci-reports
  COMPILER_ENABLE_COVERAGE: "ON"
  COMPILER_BUILD_ARTIFACT_NAME: compiler-build
  COMPILER_TEST_REPORT_ARTIFACT_NAME: compiler-test-reports
  COMPILER_ARTIFACT_RETENTION_DAYS: "7"
  CI_CMAKE_GENERATOR: Ninja
  CI_FETCHCONTENT_BASE_DIR: /home/runner/.cache/compiler-ci/fetchcontent
  REPORT_REPO: ${{ github.repository }}
  REPORT_SHA: ${{ github.sha }}

jobs:
  static:
    name: Static Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install formatting tools
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y clang-format

      - name: Check formatting
        working-directory: ${{ env.COMPILER_DIR }}
        run: make ci-static

  build:
    name: Build Compiler
    runs-on: ubuntu-latest
    needs:
      - static
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup CMake
        uses: lukka/get-cmake@latest

      - name: Restore FetchContent cache
        id: restore_fetchcontent
        uses: actions/cache/restore@v5
        with:
          path: ${{ env.CI_FETCHCONTENT_BASE_DIR }}
          key: ${{ runner.os }}-compiler-fetchcontent-${{ hashFiles('code/compiler/tests/CMakeLists.txt') }}

      - name: Install build dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y bison flex g++ libfl-dev ninja-build

      - name: Configure and build compiler
        id: build_compiler
        working-directory: ${{ env.COMPILER_DIR }}
        env:
          CI_BUILD_DIR: ../../${{ env.COMPILER_BUILD_DIR }}
          CI_BUILD_TYPE: ${{ env.COMPILER_BUILD_TYPE }}
          CI_REPORT_DIR: ../../${{ env.COMPILER_REPORT_DIR }}
          CI_CMAKE_GENERATOR: ${{ env.CI_CMAKE_GENERATOR }}
          CI_FETCHCONTENT_BASE_DIR: ${{ env.CI_FETCHCONTENT_BASE_DIR }}
          CI_ENABLE_COVERAGE: ${{ env.COMPILER_ENABLE_COVERAGE }}
        run: |
          set +e
          make ci-build
          rc=$?
          echo "exit_code=${rc}" >> "${GITHUB_OUTPUT}"
          exit 0

      - name: Summarize build findings
        if: always() && steps.build_compiler.outputs.exit_code != '0'
        run: python3 .github/scripts/compiler/summarize-build.py

      - name: Upload build logs
        if: always()
        uses: ./.github/actions/upload-artifact-soft
        with:
          name: compiler-build-logs
          path: ${{ env.COMPILER_REPORT_DIR }}
          include-hidden-files: "true"
          retention-days: ${{ env.COMPILER_ARTIFACT_RETENTION_DAYS }}
          if-no-files-found: warn

      - name: Package build artifact
        if: steps.build_compiler.outputs.exit_code == '0'
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/compiler-build-artifact"
          tar \
            --create \
            --file "${RUNNER_TEMP}/compiler-build-artifact/compiler-build.tar" \
            --directory "${COMPILER_BUILD_DIR}" \
            .

      - name: Upload build artifact
        if: steps.build_compiler.outputs.exit_code == '0'
        uses: ./.github/actions/upload-artifact-soft
        with:
          name: ${{ env.COMPILER_BUILD_ARTIFACT_NAME }}
          path: ${{ runner.temp }}/compiler-build-artifact/compiler-build.tar
          retention-days: ${{ env.COMPILER_ARTIFACT_RETENTION_DAYS }}
          if-no-files-found: error

      - name: Save FetchContent cache
        if: always() && !cancelled() && steps.restore_fetchcontent.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ env.CI_FETCHCONTENT_BASE_DIR }}
          key: ${{ steps.restore_fetchcontent.outputs.cache-primary-key }}

      - name: Fail on build errors
        if: steps.build_compiler.outputs.exit_code != '0'
        run: exit 1

  test:
    name: Test Compiler
    runs-on: ubuntu-latest
    needs:
      - build
    # Extra time when the build artifact is missing and we compile from scratch.
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download build artifact
        id: download_build
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.COMPILER_BUILD_ARTIFACT_NAME }}
          path: ${{ runner.temp }}/compiler-build-artifact

      - name: Restore build artifact
        id: restore_build
        if: steps.download_build.outcome == 'success'
        continue-on-error: true
        run: |
          set -euo pipefail
          build_tar="${RUNNER_TEMP}/compiler-build-artifact/compiler-build.tar"
          if [ ! -f "${build_tar}" ]; then
            echo "Build artifact archive not found at ${build_tar}"
            exit 1
          fi
          mkdir -p "${COMPILER_BUILD_DIR}"
          tar \
            --extract \
            --file "${build_tar}" \
            --directory "${COMPILER_BUILD_DIR}"

      - name: Warn on artifact fallback
        if: steps.download_build.outcome != 'success' || steps.restore_build.outcome != 'success'
        run: |
          echo "::warning title=Build artifact unavailable::Could not restore the compiler build from artifacts (download or upload may have failed). Rebuilding from scratch in the test job."

      - name: Setup CMake
        if: steps.download_build.outcome != 'success' || steps.restore_build.outcome != 'success'
        uses: lukka/get-cmake@latest

      - name: Restore FetchContent cache
        if: steps.download_build.outcome != 'success' || steps.restore_build.outcome != 'success'
        uses: actions/cache/restore@v5
        with:
          path: ${{ env.CI_FETCHCONTENT_BASE_DIR }}
          key: ${{ runner.os }}-compiler-fetchcontent-${{ hashFiles('code/compiler/tests/CMakeLists.txt') }}

      - name: Install build dependencies
        if: steps.download_build.outcome != 'success' || steps.restore_build.outcome != 'success'
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y bison flex g++ libfl-dev ninja-build

      - name: Build compiler from scratch
        if: steps.download_build.outcome != 'success' || steps.restore_build.outcome != 'success'
        working-directory: ${{ env.COMPILER_DIR }}
        env:
          CI_BUILD_DIR: ../../${{ env.COMPILER_BUILD_DIR }}
          CI_BUILD_TYPE: ${{ env.COMPILER_BUILD_TYPE }}
          CI_REPORT_DIR: ../../${{ env.COMPILER_REPORT_DIR }}
          CI_CMAKE_GENERATOR: ${{ env.CI_CMAKE_GENERATOR }}
          CI_FETCHCONTENT_BASE_DIR: ${{ env.CI_FETCHCONTENT_BASE_DIR }}
          CI_ENABLE_COVERAGE: ${{ env.COMPILER_ENABLE_COVERAGE }}
        run: make ci-build

      - name: Install coverage reporter
        run: |
          set -euo pipefail
          python3 -m pip install --user "gcovr==8.6"

      - name: Run compiler tests
        id: run_tests
        working-directory: ${{ env.COMPILER_DIR }}
        env:
          CI_BUILD_DIR: ../../${{ env.COMPILER_BUILD_DIR }}
          CI_BUILD_TYPE: ${{ env.COMPILER_BUILD_TYPE }}
          CI_REPORT_DIR: ../../${{ env.COMPILER_REPORT_DIR }}
          CI_ENABLE_COVERAGE: ${{ env.COMPILER_ENABLE_COVERAGE }}
        run: |
          set +e
          make ci-test
          rc=$?
          echo "exit_code=${rc}" >> "${GITHUB_OUTPUT}"
          exit 0

      - name: Report CTest results
        if: always()
        uses: dorny/test-reporter@v3
        with:
          name: CTest Test Report
          path: ${{ env.COMPILER_REPORT_DIR }}/ctest-junit.xml
          reporter: java-junit
          use-actions-summary: true
          report-title: CTest Test Report
          list-suites: failed
          list-tests: failed
          fail-on-error: false
          fail-on-empty: false

      - name: Report compiler coverage
        if: always()
        run: |
          set -euo pipefail
          for coverage_dir in \
            "${GITHUB_WORKSPACE}/${COMPILER_BUILD_DIR}/tests" \
            "${GITHUB_WORKSPACE}/${COMPILER_BUILD_DIR}/_deps"; do
            if [ -d "${coverage_dir}" ]; then
              find "${coverage_dir}" -name '*.gcda' -delete
            fi
          done
          python3 -m gcovr \
            --root "${GITHUB_WORKSPACE}/${COMPILER_DIR}" \
            --object-directory "${GITHUB_WORKSPACE}/${COMPILER_BUILD_DIR}" \
            --filter "${GITHUB_WORKSPACE}/${COMPILER_DIR}/src/.*" \
            --filter "${GITHUB_WORKSPACE}/${COMPILER_DIR}/include/.*" \
            --filter "${GITHUB_WORKSPACE}/${COMPILER_DIR}/apps/.*" \
            --exclude "${GITHUB_WORKSPACE}/${COMPILER_DIR}/tests/.*" \
            --gcov-exclude-directories "${GITHUB_WORKSPACE}/${COMPILER_BUILD_DIR}/tests" \
            --gcov-exclude-directories "${GITHUB_WORKSPACE}/${COMPILER_BUILD_DIR}/_deps" \
            --gcov-ignore-errors all \
            --markdown-summary "${GITHUB_STEP_SUMMARY}" \
            --markdown-title "GCovr Coverage Report" \
            --markdown-heading-level 2

      - name: Upload test reports
        if: always()
        uses: ./.github/actions/upload-artifact-soft
        with:
          name: ${{ env.COMPILER_TEST_REPORT_ARTIFACT_NAME }}
          path: ${{ env.COMPILER_REPORT_DIR }}
          include-hidden-files: "true"
          retention-days: ${{ env.COMPILER_ARTIFACT_RETENTION_DAYS }}
          if-no-files-found: warn

      - name: Fail on test errors
        if: steps.run_tests.outputs.exit_code != '0'
        run: exit 1

  package:
    name: Package Server Image
    runs-on: ubuntu-latest
    needs:
      - test
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build server image with compiler
        working-directory: ${{ env.COMPILER_DIR }}
        env:
          CI_PACKAGE_TAG: motivo-studio-server-ci:${{ github.sha }}
        run: make ci-package
