name: Server Workflow

on:
  workflow_dispatch:
  push:
    branches:
      - "**"
    paths:
      - "code/server/**"
      - ".github/workflows/server.yml"
      - ".github/scripts/web/**"

permissions:
  contents: read

concurrency:
  group: server-ci-${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  SERVER_DIR: code/server
  SERVER_REPORT_DIR: code/server/ci-reports
  SERVER_COVERAGE_DIR: code/server/coverage
  WEB_ARTIFACT_RETENTION_DAYS: "7"

jobs:
  lint:
    name: Check Linting
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.SERVER_DIR }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ env.SERVER_DIR }}
        run: npm ci --legacy-peer-deps

      - name: Run ESLint
        working-directory: ${{ env.SERVER_DIR }}
        run: npm run lint

  typecheck:
    name: Check Types
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.SERVER_DIR }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ env.SERVER_DIR }}
        run: npm ci --legacy-peer-deps

      - name: Run TypeScript
        working-directory: ${{ env.SERVER_DIR }}
        run: npm run typecheck

  format-check:
    name: Check Formatting
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.SERVER_DIR }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ env.SERVER_DIR }}
        run: npm ci --legacy-peer-deps

      - name: Run Prettier check
        working-directory: ${{ env.SERVER_DIR }}
        run: npm run format:check

  test:
    name: Test Server
    runs-on: ubuntu-latest
    needs:
      - lint
      - typecheck
      - format-check
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.SERVER_DIR }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ env.SERVER_DIR }}
        run: npm ci --legacy-peer-deps

      - name: Prepare report directory
        working-directory: ${{ env.SERVER_DIR }}
        run: mkdir -p ci-reports

      - name: Run Vitest
        id: run_tests
        working-directory: ${{ env.SERVER_DIR }}
        run: |
          set +e
          npm run test:ci
          rc=$?
          echo "exit_code=${rc}" >> "${GITHUB_OUTPUT}"
          exit 0

      - name: Summarize test and coverage reports
        if: always()
        env:
          APP_NAME: Server
          VITEST_REPORT_PATH: ${{ env.SERVER_REPORT_DIR }}/vitest.json
          COVERAGE_SUMMARY_PATH: ${{ env.SERVER_COVERAGE_DIR }}/coverage-summary.json
        run: python3 .github/scripts/web/summarize-vitest.py

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: server-test-reports
          path: ${{ env.SERVER_REPORT_DIR }}
          retention-days: ${{ env.WEB_ARTIFACT_RETENTION_DAYS }}
          if-no-files-found: warn

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: server-coverage
          path: ${{ env.SERVER_COVERAGE_DIR }}
          retention-days: ${{ env.WEB_ARTIFACT_RETENTION_DAYS }}
          if-no-files-found: warn

      - name: Fail on test errors
        if: steps.run_tests.outputs.exit_code != '0'
        run: exit 1

  build:
    name: Build Server
    runs-on: ubuntu-latest
    needs:
      - test
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.SERVER_DIR }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ env.SERVER_DIR }}
        run: npm ci --legacy-peer-deps

      - name: Build Express app
        working-directory: ${{ env.SERVER_DIR }}
        run: npm run build

  package:
    name: Package Server Image
    runs-on: ubuntu-latest
    needs:
      - build
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build production Docker image
        run: docker build --tag dsl-server-ci:${{ github.sha }} --file code/server/Dockerfile code
