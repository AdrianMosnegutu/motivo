name: Thesis Paper Workflow

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "paper/**"
      - "!paper/notes/**"
      - "!paper/scripts/**"
      - ".github/workflows/paper.yml"
      - ".github/scripts/paper/**"
  pull_request:
    branches:
      - main
    paths:
      - "paper/**"
      - "!paper/notes/**"
      - "!paper/scripts/**"
      - ".github/workflows/paper.yml"
      - ".github/scripts/paper/**"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: paper-ci-${{ github.workflow }}-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

env:
  PAPER_DIR: paper
  PAPER_ROOT_FILE: paper.tex
  PAPER_WRAP_LENGTH: "120"

  PAPER_ARTIFACT_NAME: thesis-landing-page
  PAPER_ARTIFACT_FILE: Design and Implementation of a Domain-Specific Language for Music Composition.pdf
  PAPER_ARTIFACT_RETENTION_DAYS: "30"

  DEMO_URL: https://bachelor-thesis.up.railway.app/

  TEXLIVE_VERSION: "2024"
  RUST_TOOLCHAIN_VERSION: "1.85.0"
  TEX_FMT_VERSION: "0.5.6"
  PYTHON_VERSION: "3.12"
  CODESPELL_VERSION: "2.3.0"

jobs:
  format-check:
    name: Check Code Formatting
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check LaTeX formatting
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN_VERSION }}

      - name: Cache tex-fmt toolchain
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-paper-ci-cargo-tex-fmt-${{ env.TEX_FMT_VERSION }}

      - name: Install tex-fmt
        env:
          TEX_FMT_VERSION: ${{ env.TEX_FMT_VERSION }}
        run: |
          set -euo pipefail

          if ! command -v tex-fmt >/dev/null 2>&1 || ! tex-fmt --version | grep -q " ${TEX_FMT_VERSION}$"; then
            cargo install --locked tex-fmt --version "${TEX_FMT_VERSION}" --force
          fi

      - name: Verify formatting
        env:
          PAPER_DIR: ${{ env.PAPER_DIR }}
          WRAP_LENGTH: ${{ env.PAPER_WRAP_LENGTH }}
          REPORT_REPO: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name || github.repository }}
          REPORT_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        run: bash .github/scripts/paper/check-format.sh

  lint-check:
    name: Check Code Linting
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check LaTeX linting
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y chktex

      - name: Run chktex
        env:
          PAPER_DIR: ${{ env.PAPER_DIR }}
          REPORT_REPO: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name || github.repository }}
          REPORT_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        run: bash .github/scripts/paper/check-lint.sh

  spell-check:
    name: Check Spelling
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check spelling
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip downloads
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-paper-ci-pip-codespell-${{ env.CODESPELL_VERSION }}

      - name: Install codespell
        env:
          CODESPELL_VERSION: ${{ env.CODESPELL_VERSION }}
        run: |
          set -euo pipefail
          python -m pip install --user "codespell==${CODESPELL_VERSION}"

      - name: Run codespell
        env:
          PAPER_DIR: ${{ env.PAPER_DIR }}
          REPORT_REPO: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name || github.repository }}
          REPORT_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        run: bash .github/scripts/paper/check-spelling.sh

  build-paper:
    name: Build Paper
    runs-on: ubuntu-latest
    needs:
      - format-check
      - lint-check
      - spell-check
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build PDF
        id: build_pdf
        continue-on-error: true
        uses: xu-cheng/texlive-action@v3
        with:
          texlive_version: ${{ env.TEXLIVE_VERSION }}
          os: debian
          run: |
            export PAPER_DIR='${{ env.PAPER_DIR }}'
            export PAPER_ROOT_FILE='${{ env.PAPER_ROOT_FILE }}'
            bash .github/scripts/paper/build-paper.sh

      - name: Summarize build findings
        if: always()
        env:
          PAPER_DIR: ${{ env.PAPER_DIR }}
          PAPER_ROOT_FILE: ${{ env.PAPER_ROOT_FILE }}
          REPORT_REPO: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name || github.repository }}
          REPORT_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        run: python3 .github/scripts/paper/summarize-build.py

      - name: Stage artifact
        env:
          PAPER_DIR: ${{ env.PAPER_DIR }}
          PAPER_ROOT_FILE: ${{ env.PAPER_ROOT_FILE }}
          PAPER_ARTIFACT_FILE: ${{ env.PAPER_ARTIFACT_FILE }}
        run: bash .github/scripts/paper/stage-artifact.sh

      - name: Stage GitHub Pages bundle
        env:
          PAPER_ARTIFACT_FILE: ${{ env.PAPER_ARTIFACT_FILE }}
          PAPER_PAGES_DIR: pages-dist
        run: bash .github/scripts/paper/stage-pages.sh

      - name: Upload paper site artifact
        uses: actions/upload-pages-artifact@v4
        with:
          name: ${{ env.PAPER_ARTIFACT_NAME }}
          path: pages-dist
          retention-days: ${{ env.PAPER_ARTIFACT_RETENTION_DAYS }}

  deploy-paper:
    name: Deploy Paper
    runs-on: ubuntu-latest
    needs:
      - build-paper
    if: github.event_name == 'push' && github.ref_name == 'main'
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: ${{ env.PAPER_ARTIFACT_NAME }}
